name: Generate Synthetic Data - MongoDB Atlas

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  generate-data:
    name: Generate & Ingest Batch Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data - MongoDB Atlas
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          MONGO_COLLECTIONS: ${{ secrets.MONGO_COLLECTIONS }}
          ORDERS_MIN: ${{ secrets.ORDERS_MIN }}
          ORDERS_MAX: ${{ secrets.ORDERS_MAX }}
          CUSTOMERS_MIN: ${{ secrets.CUSTOMERS_MIN }}
          CUSTOMERS_MAX: ${{ secrets.CUSTOMERS_MAX }}
          PRODUCTS_MIN: ${{ secrets.PRODUCTS_MIN }}
          PRODUCTS_MAX: ${{ secrets.PRODUCTS_MAX }}
          PAYMENT_METHODS: ${{ secrets.PAYMENT_METHODS }}
          PAYMENT_STATUSES: ${{ secrets.PAYMENT_STATUSES }}
          PRODUCT_CATEGORIES: ${{ secrets.PRODUCT_CATEGORIES }}
          NUMBER_OF_BATCHES: ${{ secrets.NUMBER_OF_BATCHES }}
        run: python generator/data_generator.py

      - name: Log summary
        run: echo "Data generated at $(date -u '+%Y-%m-%d %H:%M UTC')"
